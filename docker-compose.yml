version: '3.9'

services:
  db:
    image: postgres:17-alpine
    container_name: skillswap_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skillswap
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Throwaway Postgres for the integration suite (`npm run test:integration`).
  # Mapped to 5433 to avoid clashing with a local Postgres on 5432. Point the
  # tests at it with:
  #   TEST_DATABASE_URL=postgresql://postgres:postgres@localhost:5433/skillswap_test?schema=public
  db-test:
    image: postgres:17-alpine
    container_name: skillswap_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skillswap_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: skillswap_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:123456@localhost:5432/skillswap?schema=public
      JWT_ACCESS_SECRET: change_this_in_production_min_32_chars_xyz
      JWT_REFRESH_SECRET: change_this_too_in_production_min_32_chars_abc
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: '*'
    ports:
      - '3000:3000'
    restart: unless-stopped

volumes:
  postgres_data:
