name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest

    env:
      # Dummy DATABASE_URL so `prisma validate` (config reads env) and the
      # config loader are satisfied. Unit tests mock Prisma and never connect.
      DATABASE_URL: postgresql://user:password@localhost:5432/skillswap?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_minimum_32_chars_long_xyz
      JWT_REFRESH_SECRET: ci_refresh_secret_minimum_32_chars_long_xyz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Validate Prisma schema
        run: npx prisma validate --config src/config/prisma.config.ts

      - name: Run tests
        run: npm run test:run

  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    # Real Postgres for the integration suite (RUN_INTEGRATION=1). Unit tests mock
    # Prisma, but these tests exercise the actual DB (transactions, row locks).
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillswap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillswap_test?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillswap_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_minimum_32_chars_long_xyz
      JWT_REFRESH_SECRET: ci_refresh_secret_minimum_32_chars_long_xyz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push Prisma schema to the test database
        run: npx prisma db push --config src/config/prisma.config.ts

      - name: Run integration tests
        run: npm run test:integration
